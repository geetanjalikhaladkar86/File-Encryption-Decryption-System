<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="card p-4">
        <h3 class="text-center">Login</h3>
        <input id="email" class="form-control mt-3" placeholder="Email">
        <input id="password" class="form-control mt-3" placeholder="Password" type="password">
        <button class="btn btn-primary mt-3 w-100" onclick="login()">Login</button>
        <p class="mt-2 text-center">New? <a href="register.html">Register</a></p>
        <p id="err" class="text-danger mt-2"></p>
      </div>
    </div>
  </div>
</div>

<script>
async function login(){
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const res = await fetch('/api/auth/login', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({email,password})
  });
  if(res.ok){
    const data = await res.json();
    localStorage.setItem('token', data.token);
    window.location.href = 'dashboard.html';
  } else {
    document.getElementById('err').innerText = 'Invalid credentials';
  }
}
</script>
</body>
</html>
