<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card p-4">
        <h3 class="text-center">Register</h3>
        <input id="name" class="form-control mt-3" placeholder="Name">
        <input id="email" class="form-control mt-3" placeholder="Email">
        <input id="password" class="form-control mt-3" placeholder="Password" type="password">
        <button class="btn btn-success mt-3 w-100" onclick="register()">Register</button>
        <p id="msg" class="mt-2"></p>
        <p class="mt-2 text-center">Already? <a href="login.html">Login</a></p>
      </div>
    </div>
  </div>
</div>
<script>
async function register(){
  const name = document.getElementById('name').value;
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const res = await fetch('/api/auth/register', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({name,email,password})
  });
  if(res.ok){ document.getElementById('msg').innerText='Registered. Go to login.'; }
  else{ document.getElementById('msg').innerText='Error: Email may exist.'; }
}
</script>
</body>
</html>
