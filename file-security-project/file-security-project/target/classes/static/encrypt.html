<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Encrypt</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head><body class="p-4">
<div class="container">
  <h3>Select folder to encrypt</h3>
  <input id="folder" type="file" webkitdirectory directory multiple class="form-control mt-3">
  <button class="btn btn-primary mt-3" onclick="encrypt()">Encrypt & Download</button>
  <p id="msg" class="mt-2"></p>
</div>
<script>
async function encrypt(){
  const files = document.getElementById('folder').files;
  if(!files || files.length===0){ alert('Select folder'); return; }
  const form = new FormData();
  const paths = [];
  for(const f of files){
    paths.push(f.webkitRelativePath || f.name);
    form.append('files', f);
  }
  form.append('paths', JSON.stringify(paths));
  const token = localStorage.getItem('token');
  const res = await fetch('/api/encrypt', { method:'POST', headers: token?{'Authorization':'Bearer '+token}: {}, body: form });
  if(!res.ok){ alert('Error: '+ await res.text()); return; }
  const blob = await res.blob();
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'encrypted_files.zip'; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  document.getElementById('msg').innerText = 'Downloaded encrypted zip';
}
</script>
</body></html>
